
# window
window_padding_width 7

# cursor
cursor_shape block
cursor_blink_interval -1

# vim:ft=kitty

## name: Catppuccin
## blurb: Soothing pastel theme for the high-spirited!

#: basic colors
foreground              #d6d0cd
background              #1c1917
selection_background    #d6d0cd
selection_foreground    #2a2522

# cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

#: OS window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system


# colors for marks (marked text in the terminal)

mark1_foreground #1E1E2E
mark1_background #96CDFB
mark2_foreground #1E1E2E
mark2_background #F5C2E7
mark3_foreground #1E1E2E
mark3_background #B5E8E0

#: terminal colors

#: black
color0 #6E6C7E
color8 #988BA2

#: red
color1 #d49191
color9 #d49191

#: green
color2  #b6b696
color10 #b6b696

#: yellow
color3  #c4b392
color11 #c4b392

#: blue
color4  #9e96b6
color12 #9e96b6

#: magenta
color5  #b696b1
color13 #b696b1

#: cyan
color6  #bcaa9a
color14 #bcaa9a

#: white
color7  #d6d0cd
color15 #d6d0cd

#: fonts
font_family Source Code Pro Bold
font_size 12.7
