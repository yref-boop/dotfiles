
# window
window_padding_width 7

# cursor
cursor_shape block
cursor_blink_interval -1

vim:ft=kitty

#: basic colors

foreground              #FDE8E7
background              #171617
selection_background    #FDE8E7
selection_foreground    #2a2522

# cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

#: OS window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system


# colors for marks (marked text in the terminal)

mark1_foreground #1E1E2E
mark1_background #96CDFB
mark2_foreground #1E1E2E
mark2_background #F5C2E7
mark3_foreground #1E1E2E
mark3_background #B5E8E0

#: terminal colors

#: black
color0 #6E6C7E
color8 #988BA2

#: red 
color1 #D34F80
color9 #D34F80

#: green
color2  #a6e3a1
color10 #a6e3a1

#: yellow
color3  #f9e2af
color11 #f9e2af

#: blue
color4  #74c7ec
color12 #74c7ec

#: magenta 
color5  #e68ae2
color13 #e68ae2

#: cyan
color6  #89dceb
color14 #89dceb

#: white 
color7  #FDE8E7
color15 #FDE8E7

#: fonts
font_family Source Code Pro Bold
font_size 12.7
