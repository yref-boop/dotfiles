#################################
#           Animations          #
#################################
animations = true;
# `auto`, `none`, `fly-in`, `zoom`, `slide-down`, `slide-up`, `slide-left`, `slide-right` `slide-in`, `slide-out`
animation-for-unmap-window = "fly-in"; #minimize window
animation-for-workspace-switch-in = "fly-in"; #the windows in the workspace that is coming in
animation-for-workspace-switch-out = "fly-in"; #the windows in the workspace that are coming out
animation-for-transient-window = "slide-up"; #popup windows
animation-for-open-window = "zoom";
animation-dampening = 25;
animation-delta = 10;
animation-clamping = false;


#################################
#             Shadows           #
#################################

# client-side shadows on windows. desktop windows 
# (windows with '_NET_WM_WINDOW_TYPE_DESKTOP') never get shadow by default
shadow = true;

# blur radius for shadows, in pixels. (defaults to 12)
shadow-radius = 17;

# opacity of shadows. (0.0 - 1.0, defaults to 0.75)
shadow-opacity = 0.3

# left and top offset for shadows, in pixels. (defaults to -15)
shadow-offset-x = -7;
shadow-offset-y = -7;

# list of conditions of windows that should have no shadow
shadow-exclude = [
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#           Fading              #
#################################

# fade windows in/out when opening/closing and when opacity changes,
fading = true

# opacity change between steos while fading:
fade-in-step = 0.03;
fade-out-step = 0.03;


#################################
#   Transparency / Opacity      #
#################################

# opacity of inactive windows. (0.1 - 1.0, defaults to 1.0)
inactive-opacity = 1;

# let inactive opacity set by -i override the opacity values of windows
inactive-opacity-override = false;

# list of conditions of windows that should always be considered focused.
focus-exclude = [ "class_g = 'cairo-clock'" ];

# specify a list of opacity rules, in the format `PERCENT:PATTERN`, 
opacity-rule = [
	"95:class_g = 'kitty'",
	"95:class_g = 'notion-app-enhanced'",
	"95:class_g = 'obsidian'",
	"95:class_g = 'org.pwmt.zathura'",
	"95:class_g = 'Zathura'",
	"95:class_g = 'Dunst'",
 	"95:class_g = 'eww-bar'",
	"99:class_g = 'firefox'"
]

#needed for shadows to be drawn correctly
detect-rounded-corners = true;
corner-radius = 25;


#################################
#     Background-Blurring       #
#################################

# parameters for background blurring
# does not work correclty with shadows for the moment
#blur: {
#	method = "dual_kawase";
#	blur-strength = 1;
#	blur-size=1;
#	blur-deviation = false;
#	blur-backround-frame = false;
#	kernel = "11x11gaussian";
#}

# exclude conditions for background blur.
# blur-background-exclude = []
blur-background-exclude = [
  "window_type = 'desktop'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#       General Settings        #
#################################

# specify the backend to use
backend = "glx";

# enable vsync (prevents tearing)
vsync = true

# try to detect WM windows (a non-override-redirect window with no 
# child that has 'WM_STATE') and mark them as active
mark-wmwin-focused = true;

# allows info about the opacity ot be stored and passed
detect-client-opacity = true;

# leader and transient group windows and consider windows in the same 
# group focused at the same time
detect-transient = true
detect-client-leader = true

# GLX backend avoids using stencil buffer
glx-no-stencil = false

# redraws only the part of the screen that has actually changed
use-damage = true

# set the log level as either "trace", "debug", "info", "warn", "error"
log-level = "warn";
# the log file is stderr by default

#WINDOW_TYPES: 
#   "unknown", "desktop", "dock", "toolbar", "menu", "utility", 
#   "splash", "dialog", "normal", "dropdown_menu", "popup_menu", 
#   "tooltip", "notification", "combo", and "dnd".
# 
#OPTIONS:
#
#   fade, shadow::: window-type-specific shadow and fade settings.
# 
#   opacity::: default opacity of the window type.
# 
#   focus::: whether the window of this type is to be always considered focused. 
# 
#   full-shadow::: whether shadow is drawn under the parts of the window that you 
#		normally won't be able to see.
# 
#   redir-ignore::: whether a window should cause screen to become redirected again 
#   	after been unredirected.
#
wintypes:
{
  normal = {full-shadow = true;}
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = true; corner-radius = 5;}
  dnd = { shadow = false; }
  popup_menu = { corner-radius = 10; opacity = 1; full-shadow = true;}
  dropdown_menu = { corner-radius = 10; opacity = 1; full-shadow = true;}
};
